# ── LLM Fallback Chain ─────────────────────────────────────────────────────────
# Providers are tried IN ORDER. Free OpenRouter models only.
# API key is read from the OPENROUTER_API_KEY Windows environment variable.
# To add a key: setx OPENROUTER_API_KEY your-key (then restart terminal + app)
llm:
