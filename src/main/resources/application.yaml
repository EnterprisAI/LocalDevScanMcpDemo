spring:
  application:
    name: LocalDevScanMcpDemo
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:${GITHUB_TOKEN:}}
      chat:
        completions-path: ${OPENAI_COMPLETIONS_PATH:/v1/chat/completions}
        options:
          model: ${OPENAI_MODEL:models/gemini-2.5-flash-lite}
    mcp:
      server:
        name: local-dev-scan-mcp
        version: 1.0.0
        type: SYNC

sonarqube:
  url: ${SONARQUBE_URL:https://sonarcloud.io}
  token: ${SONARQUBE_TOKEN:}
  org: ${SONARQUBE_ORG:}

snyk:
  token: ${SNYK_TOKEN:}
  org-id: ${SNYK_ORG_ID:}
  docker-image: ${SNYK_DOCKER_IMAGE:snyk/snyk:maven}

github:
  token: ${GITHUB_TOKEN:}
  webhook-secret: ${GITHUB_WEBHOOK_SECRET:}

server:
  port: 8080
